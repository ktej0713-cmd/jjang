[api]
godo_api_url = https://openhub.godo.co.kr/godomall5/board/Board_Write.php
partner_key = YOUR_PARTNER_KEY
user_key = YOUR_USER_KEY
board_id = customgallery

[ftp]
ftp_host = YOUR_FTP_HOST
ftp_user = YOUR_FTP_USER
ftp_pass = YOUR_FTP_PASS
ftp_upload_dir = /data/image/ORDER_GALLERY
image_base_url = https://YOUR_DOMAIN.hgodo.com

[settings]
image_folder = D:\ORDER GALLERY
image_extensions = .jpg,.jpeg,.png,.gif,.webp,.bmp
done_folder =
post_title_format = {filename}
post_content_format =
upload_delay = 2
