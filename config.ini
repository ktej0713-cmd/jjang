[godo]
# 고도몰 관리자 로그인 URL
admin_login_url = https://yourshop.godomall.com/login/login.php

# 오더갤러리 게시판 글쓰기 URL
board_write_url = https://yourshop.godomall.com/board/write.php?bdId=order_gallery

# 고도몰 관리자 계정
admin_id = your_admin_id
admin_pw = your_admin_pw

[settings]
# 업로드할 이미지 폴더 경로 (Windows 예시: D:\ORDER GALLERY)
image_folder = D:\ORDER GALLERY

# 지원하는 이미지 확장자 (쉼표 구분)
image_extensions = .jpg,.jpeg,.png,.gif,.webp,.bmp

# 업로드 완료된 이미지를 이동시킬 폴더 (비워두면 이동하지 않음)
done_folder =

# 게시글 제목 형식 ({filename}은 파일명으로 대체됨)
post_title_format = {filename}

# 게시글 내용 형식 ({filename}은 파일명으로 대체됨)
post_content_format =

# 각 업로드 사이의 대기 시간 (초)
upload_delay = 3

# 브라우저 헤드리스 모드 (true: 브라우저 안 보임, false: 브라우저 보임)
headless = false

[selectors]
# 고도몰 페이지 CSS 셀렉터 (고도몰 버전에 따라 다를 수 있음)
# 로그인 페이지
id_input = input[name="loginId"]
pw_input = input[name="loginPwd"]
login_button = button.btn-login

# 게시판 글쓰기 페이지
title_input = input[name="subject"]
content_textarea = textarea[name="contents"]
file_input = input[type="file"]
submit_button = button[type="submit"]
