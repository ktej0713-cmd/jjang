[api]
# 고도몰 쇼핑몰 도메인 (https:// 포함)
shop_url = https://jjangbaseball.com

# 고도몰 Open API 인증 키
partner_key = YOUR_PARTNER_KEY
user_key = YOUR_USER_KEY

# 게시판 ID (오더갤러리)
board_id = customgallery

[settings]
# 업로드할 이미지 폴더 경로 (Windows 예시: D:\ORDER GALLERY)
image_folder = D:\ORDER GALLERY

# 지원하는 이미지 확장자 (쉼표 구분)
image_extensions = .jpg,.jpeg,.png,.gif,.webp,.bmp

# 업로드 완료된 이미지를 이동시킬 폴더 (비워두면 이동하지 않음)
done_folder =

# 게시글 제목 형식 ({filename}은 확장자 제외 파일명으로 대체됨)
post_title_format = {filename}

# 게시글 내용 형식 ({filename}은 파일명으로 대체됨, 비워두면 제목과 동일)
post_content_format =

# 각 업로드 사이의 대기 시간 (초)
upload_delay = 2
