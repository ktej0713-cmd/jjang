<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배너 01 - 2026 시즌 개막</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* 배너 컨테이너 - 1200x400 PC 사이즈 */
  .banner {
    width: 1200px;
    height: 400px;
    background: linear-gradient(135deg, #1B2A4A 0%, #2C3E6B 60%, #1B2A4A 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  /* 배경 장식 - 야구공 스티치 패턴 */
  .banner::before {
    content: '';
    position: absolute;
    top: -80px;
    right: -40px;
    width: 500px;
    height: 500px;
    border: 3px solid rgba(212, 168, 67, 0.12);
    border-radius: 50%;
  }
  .banner::after {
    content: '';
    position: absolute;
    bottom: -120px;
    right: 100px;
    width: 400px;
    height: 400px;
    border: 2px solid rgba(212, 168, 67, 0.08);
    border-radius: 50%;
  }

  /* 좌측 텍스트 영역 */
  .banner-text {
    position: relative;
    z-index: 2;
    padding-left: 80px;
    max-width: 650px;
  }

  /* 상단 뱃지 */
  .badge {
    display: inline-block;
    background: #D4A843;
    color: #0F1A30;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 16px;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  /* 메인 타이틀 */
  .title {
    color: #FFFFFF;
    font-size: 42px;
    font-weight: 800;
    line-height: 1.25;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  .title .accent {
    color: #D4A843;
  }

  /* 서브 텍스트 */
  .subtitle {
    color: rgba(255,255,255,0.75);
    font-size: 17px;
    font-weight: 400;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  /* CTA 영역 */
  .cta-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .cta-primary {
    display: inline-block;
    background: #D4A843;
    color: #0F1A30;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 32px;
    text-decoration: none;
    transition: background 0.2s;
  }
  .cta-primary:hover {
    background: #E8C876;
  }
  .cta-secondary {
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.35);
    color: #FFFFFF;
    font-size: 15px;
    font-weight: 500;
    padding: 13px 28px;
    text-decoration: none;
    transition: border-color 0.2s;
  }
  .cta-secondary:hover {
    border-color: rgba(255,255,255,0.7);
  }

  /* 우측 상품 카드 영역 */
  .product-cards {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 14px;
    z-index: 2;
  }
  .product-card {
    width: 140px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 12px;
    text-align: center;
  }
  .product-card .icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .product-card .name {
    color: #FFFFFF;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .product-card .price {
    color: #D4A843;
    font-size: 11px;
    font-weight: 700;
  }

  /* 하단 골드 라인 */
  .gold-line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, #D4A843 0%, #E8C876 50%, #D4A843 100%);
  }
</style>
</head>
<body>

<div class="banner">
  <div class="banner-text">
    <div class="badge">2026 SEASON OPEN</div>
    <div class="title">
      시즌 개막,<br>
      <span class="accent">장비 세팅</span> 완료하셨습니까?
    </div>
    <div class="subtitle">
      글러브 &#183; 배트 &#183; 야구화 &#183; 보호장비<br>
      포지션별 필수 장비를 한번에 준비하세요
    </div>
    <div class="cta-row">
      <a href="#" class="cta-primary">개막 필수템 보기 &#10140;</a>
      <a href="#" class="cta-secondary">포지션별 추천</a>
    </div>
  </div>

  <div class="product-cards">
    <div class="product-card">
      <div class="icon">&#9918;</div>
      <div class="name">글러브</div>
      <div class="price">99,000원~</div>
    </div>
    <div class="product-card">
      <div class="icon">&#9917;</div>
      <div class="name">배트</div>
      <div class="price">89,000원~</div>
    </div>
    <div class="product-card">
      <div class="icon">&#128095;</div>
      <div class="name">야구화</div>
      <div class="price">65,000원~</div>
    </div>
  </div>

  <div class="gold-line"></div>
</div>

</body>
</html>
