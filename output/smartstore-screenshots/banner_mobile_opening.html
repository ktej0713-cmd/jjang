<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1176">
<title>배너 모바일 - 2026 시즌 개막전</title>
<style>
  :root {
    --primary: #1B2A4A;
    --primary-light: #2C3E6B;
    --primary-dark: #0F1A30;
    --accent: #D4A843;
    --accent-light: #E8C876;
    --accent-dark: #B8922E;
    --white: #FFFFFF;
    --gray-300: #CCCCCC;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1176px;
    height: 790px;
    overflow: hidden;
    font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', '돋움', Dotum, sans-serif;
  }

  /* 배너 전체 컨테이너 */
  .banner {
    width: 1176px;
    height: 790px;
    background-color: var(--primary);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  /* 배경 질감: 우측 하단에 큰 수직 텍스트 장식 */
  .bg-deco-text {
    position: absolute;
    right: -10px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-size: 260px;
    font-weight: 900;
    color: var(--primary-light);
    letter-spacing: -10px;
    white-space: nowrap;
    user-select: none;
    opacity: 0.35;
    line-height: 1;
  }

  /* 좌측 골드 세로선 강조 */
  .left-bar {
    position: absolute;
    left: 80px;
    top: 0;
    width: 4px;
    height: 100%;
    background-color: var(--accent);
    opacity: 0.6;
  }

  /* 우측 골드 세로선 */
  .right-bar {
    position: absolute;
    right: 80px;
    top: 0;
    width: 1px;
    height: 100%;
    background-color: var(--accent);
    opacity: 0.25;
  }

  /* 상단 골드 가로선 */
  .top-bar {
    position: absolute;
    top: 80px;
    left: 0;
    width: 100%;
    height: 1px;
    background-color: var(--accent);
    opacity: 0.2;
  }

  /* 하단 골드 가로선 */
  .bottom-bar {
    position: absolute;
    bottom: 80px;
    left: 0;
    width: 100%;
    height: 1px;
    background-color: var(--accent);
    opacity: 0.2;
  }

  /* 메인 콘텐츠 영역 */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 160px;
  }

  /* 상단 시즌 태그 */
  .season-tag {
    display: inline-block;
    background-color: var(--accent);
    color: var(--primary-dark);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 8px 28px;
    margin-bottom: 36px;
  }

  /* 메인 제목 */
  .main-title {
    font-size: 110px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: -3px;
    line-height: 1.05;
    margin-bottom: 12px;
  }

  /* 메인 제목 연도 강조 */
  .main-title .year {
    color: var(--accent);
  }

  /* 부제목 */
  .sub-title {
    font-size: 30px;
    font-weight: 400;
    color: var(--accent-light);
    letter-spacing: 1px;
    margin-bottom: 52px;
    line-height: 1.5;
  }

  /* 골드 구분선 */
  .divider {
    width: 60px;
    height: 2px;
    background-color: var(--accent);
    margin: 0 auto 52px;
  }

  /* 카테고리 나열 */
  .category-list {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    margin-bottom: 60px;
  }

  .category-item {
    font-size: 26px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: 0;
    opacity: 0.9;
  }

  .category-dot {
    font-size: 20px;
    color: var(--accent);
    margin: 0 18px;
    opacity: 0.8;
  }

  /* 하단 로고 */
  .logo-area {
    position: absolute;
    bottom: 40px;
    right: 100px;
    z-index: 10;
    text-align: right;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .logo-sub {
    font-size: 13px;
    font-weight: 400;
    color: var(--gray-300);
    letter-spacing: 3px;
    margin-top: 3px;
  }

</style>
</head>
<body>
<div class="banner">

  <!-- 배경 장식 요소 -->
  <div class="left-bar"></div>
  <div class="right-bar"></div>
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>

  <!-- 우측 배경 텍스트 장식 (회전) -->
  <div class="bg-deco-text">BASEBALL</div>

  <!-- 메인 콘텐츠 -->
  <div class="content">

    <!-- 시즌 태그 -->
    <div class="season-tag">2026 KBO &amp; 사회인야구 개막</div>

    <!-- 메인 제목 -->
    <div class="main-title">
      <span class="year">시즌</span> 개막전
    </div>

    <!-- 부제목 -->
    <div class="sub-title">
      야구 시즌이 돌아왔다 &mdash; 개막맞이 특가
    </div>

    <!-- 골드 구분선 -->
    <div class="divider"></div>

    <!-- 카테고리 나열 -->
    <div class="category-list">
      <span class="category-item">글러브</span>
      <span class="category-dot">&#183;</span>
      <span class="category-item">배트</span>
      <span class="category-dot">&#183;</span>
      <span class="category-item">야구화</span>
      <span class="category-dot">&#183;</span>
      <span class="category-item">장갑</span>
    </div>

  </div>

  <!-- 하단 로고 -->
  <div class="logo-area">
    <div class="logo-text">짱베이스볼</div>
    <div class="logo-sub">JJANG BASEBALL</div>
  </div>

</div>
</body>
</html>
