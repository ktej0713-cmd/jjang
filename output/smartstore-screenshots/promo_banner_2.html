<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프로모션 배너 2 - 신상품 안내</title>
<style>
  :root {
    --primary: #1B2A4A;
    --accent: #D4A843;
    --accent-dark: #B8922E;
    --gray-700: #555555;
    --gray-500: #888888;
    --gray-300: #CCCCCC;
    --gray-100: #F5F5F5;
    --white: #FFFFFF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 750px;
    height: 300px;
    overflow: hidden;
    font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', '돋움', Dotum, sans-serif;
  }

  /* 배너 전체 - 흰 배경 */
  .banner {
    width: 750px;
    height: 300px;
    background-color: var(--white);
    position: relative;
    overflow: hidden;
  }

  /* 우측 사선 장식 영역 */
  .deco-right {
    position: absolute;
    right: 0;
    top: 0;
    width: 280px;
    height: 300px;
    background-color: var(--gray-100);
    clip-path: polygon(80px 0, 100% 0, 100% 100%, 0 100%);
  }

  /* 우측 사선 골드 라인 1 */
  .deco-line-1 {
    position: absolute;
    right: 0;
    top: 0;
    width: 280px;
    height: 300px;
    overflow: hidden;
  }

  .deco-line-1::before {
    content: '';
    position: absolute;
    /* 배너를 대각선으로 가로지르는 골드 선 */
    left: 60px;
    top: -10px;
    width: 2px;
    height: 400px;
    background-color: var(--accent);
    opacity: 0.7;
    transform: rotate(0deg);
  }

  .deco-line-1::after {
    content: '';
    position: absolute;
    left: 90px;
    top: -10px;
    width: 1px;
    height: 400px;
    background-color: var(--accent);
    opacity: 0.3;
  }

  /* 좌측 콘텐츠 영역 */
  .content {
    position: absolute;
    left: 60px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
  }

  /* 상단 NEW 배지 */
  .new-badge {
    display: inline-block;
    background-color: var(--primary);
    color: var(--white);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 4px 12px;
    margin-bottom: 16px;
  }

  /* 메인 타이틀 */
  .main-title {
    font-size: 56px;
    font-weight: 900;
    color: var(--primary);
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  /* 골드 구분선 */
  .divider {
    width: 32px;
    height: 2px;
    background-color: var(--accent);
    margin-bottom: 16px;
  }

  /* 브랜드 나열 */
  .brand-list {
    font-size: 15px;
    font-weight: 400;
    color: var(--gray-700);
    letter-spacing: 0.5px;
  }

  .brand-list span {
    color: var(--gray-300);
    margin: 0 8px;
    font-weight: 300;
  }

  /* 우측 콘텐츠 (사선 배경 위) */
  .right-content {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    text-align: center;
  }

  /* 큰 장식 숫자/텍스트 */
  .deco-year {
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-700);
    letter-spacing: 2px;
    writing-mode: vertical-rl;
    text-orientation: upright;
    opacity: 0.6;
  }

  /* 하단 우측 브랜드 */
  .brand {
    position: absolute;
    bottom: 20px;
    right: 30px;
    z-index: 10;
  }

  .brand-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 1px;
    text-align: right;
  }

  .brand-sub {
    font-size: 9px;
    font-weight: 400;
    color: var(--gray-500);
    letter-spacing: 3px;
    margin-top: 2px;
    text-align: right;
  }

  /* 하단 좌측 안내 문구 */
  .bottom-note {
    position: absolute;
    bottom: 24px;
    left: 60px;
    font-size: 11px;
    color: var(--gray-500);
    letter-spacing: 0.5px;
  }

  /* 상단 가로 강조선 (골드) */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    width: 220px;
    height: 3px;
    background-color: var(--accent);
  }
</style>
</head>
<body>
<div class="banner">

  <!-- 상단 골드 강조선 -->
  <div class="top-accent"></div>

  <!-- 우측 사선 배경 -->
  <div class="deco-right"></div>
  <div class="deco-line-1"></div>

  <!-- 좌측 메인 콘텐츠 -->
  <div class="content">
    <div class="new-badge">NEW ARRIVAL</div>
    <div class="main-title">신상 입고</div>
    <div class="divider"></div>
    <div class="brand-list">
      롤링스<span>&#183;</span>미즈노<span>&#183;</span>YGS
    </div>
  </div>

  <!-- 우측 세로 텍스트 장식 -->
  <div class="right-content">
    <div class="deco-year">2026 S/S</div>
  </div>

  <!-- 하단 좌측 안내 -->
  <div class="bottom-note">최신 입고 상품 확인하기</div>

  <!-- 브랜드명 -->
  <div class="brand">
    <div class="brand-name">짱베이스볼</div>
    <div class="brand-sub">JJANGBASEBALL</div>
  </div>

</div>
</body>
</html>
