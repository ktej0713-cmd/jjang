<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프로모션 배너 1 - 개막시즌</title>
<style>
  :root {
    --primary: #1B2A4A;
    --primary-light: #2C3E6B;
    --accent: #D4A843;
    --accent-light: #E8C876;
    --white: #FFFFFF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 750px;
    height: 300px;
    overflow: hidden;
    font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', '돋움', Dotum, sans-serif;
  }

  /* 배너 전체 */
  .banner {
    width: 750px;
    height: 300px;
    background-color: var(--primary);
    position: relative;
    overflow: hidden;
  }

  /* 우측 "PLAY BALL" 반투명 텍스트 */
  .bg-text {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 88px;
    font-weight: 900;
    color: var(--primary-light);
    letter-spacing: -2px;
    white-space: nowrap;
    opacity: 0.45;
    line-height: 1;
    user-select: none;
  }

  /* 상단 골드 가로선 */
  .line-top {
    position: absolute;
    top: 40px;
    left: 0;
    width: 100%;
    height: 1px;
    background-color: var(--accent);
    opacity: 0.25;
  }

  /* 하단 골드 가로선 */
  .line-bottom {
    position: absolute;
    bottom: 40px;
    left: 0;
    width: 100%;
    height: 1px;
    background-color: var(--accent);
    opacity: 0.25;
  }

  /* 좌측 세로 강조선 */
  .line-left {
    position: absolute;
    left: 44px;
    top: 0;
    width: 3px;
    height: 100%;
    background-color: var(--accent);
    opacity: 0.5;
  }

  /* 메인 콘텐츠 - 좌측 배치 */
  .content {
    position: absolute;
    left: 70px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
  }

  /* 상단 시즌 라벨 */
  .season-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.9;
  }

  /* 메인 타이틀 */
  .main-title {
    font-size: 52px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  /* 서브 텍스트 - 골드 */
  .sub-text {
    font-size: 16px;
    font-weight: 400;
    color: var(--accent-light);
    letter-spacing: 1px;
    line-height: 1.5;
  }

  .sub-text span {
    margin: 0 4px;
    opacity: 0.7;
    color: var(--accent);
  }

  /* 하단 우측 브랜드 텍스트 */
  .brand {
    position: absolute;
    bottom: 20px;
    right: 30px;
    z-index: 10;
    text-align: right;
  }

  .brand-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .brand-sub {
    font-size: 10px;
    font-weight: 400;
    color: var(--white);
    letter-spacing: 3px;
    opacity: 0.45;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="banner">

  <!-- 배경 장식선 -->
  <div class="line-top"></div>
  <div class="line-bottom"></div>
  <div class="line-left"></div>

  <!-- 우측 배경 텍스트 -->
  <div class="bg-text">PLAY BALL</div>

  <!-- 메인 콘텐츠 -->
  <div class="content">
    <div class="season-label">2026 Season Opening</div>
    <div class="main-title">2026 개막 시즌</div>
    <div class="sub-text">
      글러브<span>&#183;</span>배트<span>&#183;</span>야구화 특가
    </div>
  </div>

  <!-- 브랜드명 -->
  <div class="brand">
    <div class="brand-name">짱베이스볼</div>
    <div class="brand-sub">JJANGBASEBALL</div>
  </div>

</div>
</body>
</html>
