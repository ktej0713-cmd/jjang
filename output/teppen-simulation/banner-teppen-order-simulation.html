<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배너 - 테펜 오더 글러브 시뮬레이션</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: '맑은 고딕','Malgun Gothic','Apple SD Gothic Neo','돋움',Dotum,sans-serif; }

  /* 배너 컨테이너 - 1200x400 PC 기획전 배너 */
  .banner {
    width: 1200px;
    height: 400px;
    position: relative;
    overflow: hidden;
    display: block;
  }

  /* 배경 이미지 */
  .banner-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 좌측 텍스트 가독성을 위한 오버레이 */
  .banner-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, rgba(15,26,48,0.92) 0%, rgba(15,26,48,0.75) 60%, transparent 100%);
  }

  /* 텍스트 영역 */
  .banner-text {
    position: absolute;
    top: 50%;
    left: 70px;
    transform: translateY(-50%);
    z-index: 2;
    max-width: 550px;
  }

  /* 브랜드 라벨 */
  .brand-label {
    display: inline-block;
    color: #D4A843;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .brand-label::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: #D4A843;
    vertical-align: middle;
    margin-right: 10px;
  }

  /* 메인 타이틀 */
  .title {
    color: #FFFFFF;
    font-size: 38px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 14px;
    letter-spacing: -0.5px;
  }
  .title em {
    font-style: normal;
    color: #D4A843;
  }

  /* 서브 카피 */
  .subtitle {
    color: rgba(255,255,255,0.65);
    font-size: 15px;
    font-weight: 400;
    line-height: 1.7;
    margin-bottom: 12px;
  }

  /* 스펙 요약 */
  .spec-line {
    display: inline-block;
    margin-bottom: 26px;
  }
  .spec-line span {
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-right: 18px;
  }
  .spec-line span strong {
    color: rgba(255,255,255,0.85);
    font-weight: 700;
  }

  /* CTA 버튼 */
  .cta-btn {
    display: inline-block;
    background: #D4A843;
    color: #0F1A30;
    font-size: 15px;
    font-weight: 700;
    padding: 13px 34px;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: background 0.2s;
  }
  .cta-btn:hover {
    background: #E8C876;
  }

  /* 좌측 세로 장식선 */
  .side-accent {
    position: absolute;
    left: 0; top: 60px; bottom: 60px;
    width: 3px;
    background: linear-gradient(180deg, transparent 0%, #D4A843 30%, #D4A843 70%, transparent 100%);
    z-index: 2;
  }

  /* 하단 골드 라인 */
  .gold-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #D4A843 30%, #E8C876 50%, #D4A843 70%, transparent 100%);
    z-index: 2;
  }
</style>
</head>
<body>

<a href="#" style="text-decoration:none;">
<div class="banner">
  <!-- 배경 이미지 (nano-banana 생성) -->
  <img class="banner-bg" src="teppen-banner-final-v1.jpeg" alt="테펜 오더 글러브">

  <!-- 좌측 텍스트 가독성 오버레이 -->
  <div class="banner-overlay"></div>

  <div class="side-accent"></div>

  <div class="banner-text">
    <div class="brand-label">Teppen Order Simulation</div>
    <div class="title">
      내 글러브,<br>
      <em>직접 디자인</em>해보세요
    </div>
    <div class="subtitle">
      오사카 자사공장 장인이 만드는 테펜 오더 글러브<br>
      컬러 &#183; 웹 &#183; 레이스 &#183; 자수까지 17가지 항목을 직접 선택
    </div>
    <div class="spec-line">
      <span><strong>13</strong> 모델</span>
      <span><strong>17</strong> 웹</span>
      <span><strong>21</strong> 레이스컬러</span>
      <span><strong>3</strong> 시리즈</span>
    </div>
    <br>
    <span class="cta-btn">자세히 보기 &#10140;</span>
  </div>

  <div class="gold-line"></div>
</div>
</a>

</body>
</html>
