<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배너 - 테펜 오더 글러브 (모바일)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: '맑은 고딕','Malgun Gothic','Apple SD Gothic Neo','돋움',Dotum,sans-serif;
  }

  /* 배너 컨테이너 - 720x400 모바일 기획전 배너 */
  .banner {
    width: 720px;
    height: 400px;
    position: relative;
    overflow: hidden;
    display: block;
  }

  /* 배경 이미지 - 글러브 중심으로 크롭 */
  .banner-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
  }

  /* 전체 오버레이 - 모바일은 텍스트 영역을 더 넓게 */
  .banner-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 70%;
    height: 100%;
    background: linear-gradient(90deg, rgba(15,26,48,0.94) 0%, rgba(15,26,48,0.80) 65%, transparent 100%);
  }

  /* 텍스트 영역 */
  .banner-text {
    position: absolute;
    top: 50%;
    left: 44px;
    transform: translateY(-50%);
    z-index: 2;
    max-width: 380px;
  }

  /* 브랜드 라벨 */
  .brand-label {
    display: inline-block;
    color: #D4A843;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .brand-label::before {
    content: '';
    display: inline-block;
    width: 18px;
    height: 1px;
    background: #D4A843;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* 메인 타이틀 */
  .title {
    color: #FFFFFF;
    font-size: 34px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }
  .title em {
    font-style: normal;
    color: #D4A843;
  }

  /* CTA 버튼 */
  .cta-btn {
    display: inline-block;
    background: #D4A843;
    color: #0F1A30;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 30px;
    text-decoration: none;
    letter-spacing: 0.3px;
  }

  /* 좌측 세로 장식선 */
  .side-accent {
    position: absolute;
    left: 0; top: 70px; bottom: 70px;
    width: 3px;
    background: linear-gradient(180deg, transparent 0%, #D4A843 30%, #D4A843 70%, transparent 100%);
    z-index: 2;
  }

  /* 하단 골드 라인 */
  .gold-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #D4A843 30%, #E8C876 50%, #D4A843 70%, transparent 100%);
    z-index: 2;
  }
</style>
</head>
<body>

<a href="#" style="text-decoration:none;">
<div class="banner">
  <!-- 배경 이미지 -->
  <img class="banner-bg" src="teppen-banner-final-v1.jpeg" alt="테펜 오더 글러브">

  <!-- 텍스트 가독성 오버레이 -->
  <div class="banner-overlay"></div>

  <div class="side-accent"></div>

  <div class="banner-text">
    <div class="brand-label">Teppen Order Glove</div>
    <div class="title">
      내 글러브,<br>
      <em>직접 디자인</em>해보세요
    </div>
    <span class="cta-btn">자세히 보기 &#10140;</span>
  </div>

  <div class="gold-line"></div>
</div>
</a>

</body>
</html>
