<!--
========================================
짱베이스볼 - 메타 description + OG 태그
========================================

[파일 1] 공통 레이아웃용 (홈/카테고리)
적용 위치: 고도몰 관리자 > 디자인 > 스킨 편집 > layout/head.html
삽입 위치: <head> 태그 내부, <title> 아래

[파일 2] 상품 상세 페이지용
적용 위치: 고도몰 관리자 > 디자인 > 스킨 편집 > goods/goods_view.html
삽입 위치: 파일 최상단 (레이아웃 블록 전)
========================================
-->


<!-- ============================================ -->
<!-- [파일 1] layout/head.html 에 추가할 공통 메타 -->
<!-- ============================================ -->

<!-- 기본 description (홈페이지/카테고리 등 공통) -->
<meta name="description" content="짱베이스볼 - 야구를 아는 사람이 운영하는 야구용품 전문 쇼핑몰. 미즈노, 제트, 롤링스, 윌슨 등 정품 글러브, 배트, 야구화, 유니폼. 사회인야구부터 엘리트 선수까지.">

<!-- Open Graph 기본 -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="짱베이스볼">
<meta property="og:locale" content="ko_KR">

<!-- 트위터 카드 -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@jjangbaseball">


<!-- ============================================ -->
<!-- [파일 2] goods/goods_view.html 상단에 추가     -->
<!-- 상품 상세 페이지 전용 메타/OG 태그              -->
<!-- ============================================ -->

<!--
  아래 코드를 goods_view.html 최상단에 넣으세요.
  고도몰은 상품 상세 페이지에서 <head>를 직접 제어할 수 없으므로,
  JavaScript로 동적 삽입합니다.
-->

<!-- 상품 메타 데이터 소스 -->
<div id="jjang-meta-data" style="display:none !important;"
  data-title="{=gd_htmlspecialchars(goodsView['goodsNm'])}"
  data-description="{=gd_htmlspecialchars(gd_isset(goodsView['shortDescription'],''))}"
  data-image="{=goodsView['magnifyImageSrc']}"
  data-price="{=gd_isset(goodsView['goodsPrice'],0)}"
  data-goods-no="{=goodsView['goodsNo']}"
  data-brand="{=gd_htmlspecialchars(gd_isset(goodsView['brandNm'],''))}"
></div>

<script>
(function() {
  var el = document.getElementById('jjang-meta-data');
  if (!el) return;

  var title = el.getAttribute('data-title') || '';
  var desc = el.getAttribute('data-description') || '';
  var image = el.getAttribute('data-image') || '';
  var price = el.getAttribute('data-price') || '';
  var goodsNo = el.getAttribute('data-goods-no') || '';
  var brand = el.getAttribute('data-brand') || '';

  /* 이미지 절대경로 */
  if (image && image.indexOf('http') !== 0) {
    image = 'https://www.jjangbaseball.com' + image;
  }

  var url = 'https://www.jjangbaseball.com/goods/goods_view.php?goodsNo=' + goodsNo;

  /* description 생성 */
  var metaDesc = desc
    ? (brand ? brand + ' ' : '') + title + ' - ' + desc + ' | 짱베이스볼'
    : (brand ? brand + ' ' : '') + title + ' - 야구용품 전문 쇼핑몰 짱베이스볼에서 정품 구매';

  /* 150자 제한 */
  if (metaDesc.length > 150) {
    metaDesc = metaDesc.substring(0, 147) + '...';
  }

  /* 페이지 타이틀 업데이트 */
  document.title = title + ' - 짱베이스볼';

  /* 메타 태그 삽입 함수 */
  function setMeta(attr, key, value) {
    var existing = document.querySelector('meta[' + attr + '="' + key + '"]');
    if (existing) {
      existing.setAttribute('content', value);
    } else {
      var meta = document.createElement('meta');
      meta.setAttribute(attr, key);
      meta.setAttribute('content', value);
      document.head.appendChild(meta);
    }
  }

  /* description */
  setMeta('name', 'description', metaDesc);

  /* Open Graph */
  setMeta('property', 'og:title', title + ' | 짱베이스볼');
  setMeta('property', 'og:description', metaDesc);
  setMeta('property', 'og:image', image);
  setMeta('property', 'og:url', url);
  setMeta('property', 'og:type', 'product');
  setMeta('property', 'og:locale', 'ko_KR');
  setMeta('property', 'og:site_name', '짱베이스볼');

  /* 상품 가격 OG */
  setMeta('property', 'product:price:amount', price.replace(/[^0-9]/g, ''));
  setMeta('property', 'product:price:currency', 'KRW');

  /* 트위터 카드 */
  setMeta('name', 'twitter:title', title + ' | 짱베이스볼');
  setMeta('name', 'twitter:description', metaDesc);
  setMeta('name', 'twitter:image', image);
})();
</script>
