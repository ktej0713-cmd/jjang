<!-- 웹사이트 검색 (WebSite + SearchAction) -->
<script type="application/ld+json">

  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "짱베이스볼",
  "alternateName": "JJang Baseball",
  "url": "https://www.jjangbaseball.com",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://www.jjangbaseball.com/goods/goods_search.php?keyword={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
